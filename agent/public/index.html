<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Manager Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Agent status">
        <div>
          <p class="eyebrow">Task Manager Agent</p>
          <h1>整理，落盘，复盘</h1>
        </div>
        <div class="status-pill" id="statusPill">检查配置中</div>
      </section>

      <section class="workspace">
        <aside class="panel config-panel">
          <div class="panel-head">
            <h2>运行设置</h2>
            <button class="icon-button" id="refreshButton" title="刷新配置" aria-label="刷新配置">↻</button>
          </div>

          <label class="field">
            <span>模型通道</span>
            <select id="providerSelect"></select>
          </label>

          <label class="field">
            <span>Base URL</span>
            <input id="baseUrlInput" autocomplete="off" placeholder="https://api.deepseek.com" />
          </label>

          <label class="field">
            <span>Model</span>
            <input id="modelInput" autocomplete="off" placeholder="deepseek-v4-flash" />
          </label>

          <label class="field">
            <span>API Key</span>
            <input id="apiKeyInput" type="password" autocomplete="off" placeholder="只保存在浏览器本地" />
          </label>

          <div class="switch-row">
            <label class="switch">
              <input id="persistToggle" type="checkbox" checked />
              <span></span>
            </label>
            <div>
              <strong>保存到本地 Markdown</strong>
              <p>开启后后端会调用 <code>task_manager_store.py</code>。</p>
            </div>
          </div>

          <details class="init-box">
            <summary>初始化任务目录</summary>
            <label class="field">
              <span>任务目录路径</span>
              <input id="taskRootInput" autocomplete="off" placeholder="选择你的 Obsidian 任务目录" />
            </label>
            <label class="field">
              <span>触发模式</span>
              <select id="triggerModeInput">
                <option value="built-in">内置触发语</option>
                <option value="explicit-only">只用 $task-manager</option>
                <option value="custom">自定义触发语</option>
              </select>
            </label>
            <button class="primary" id="initButton">初始化 / 更新配置</button>
          </details>
        </aside>

        <section class="panel compose-panel">
          <div class="mode-tabs" role="tablist" aria-label="整理模式">
            <button class="tab active" data-mode="organize">整理</button>
            <button class="tab" data-mode="daily">每日</button>
            <button class="tab" data-mode="weekly">周复盘</button>
          </div>

          <label class="field prompt-field">
            <span>把脑子里的事倒在这里</span>
            <textarea id="inputText" rows="12" placeholder="不用排序，直接写：作业、论文、账单、想学的东西、卡住的事、担心的 deadline..."></textarea>
          </label>

          <div class="action-row">
            <button class="primary run" id="runButton">运行 Agent</button>
            <button class="secondary" id="sampleButton">填入示例</button>
          </div>
        </section>

        <section class="panel result-panel">
          <div class="panel-head">
            <h2>结果</h2>
            <span id="modelBadge" class="badge">未运行</span>
          </div>
          <div id="resultSummary" class="summary-grid"></div>
          <pre id="jsonOutput" class="json-output">{}</pre>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
